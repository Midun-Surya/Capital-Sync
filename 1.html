<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equity Ledger | Auto-Sync Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0c0c0e; color: #e4e4e7; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: #18181b; border: 1px solid #27272a; border-radius: 4px; }
        input { background: transparent; outline: none; border-bottom: 1px solid transparent; transition: all 0.2s; }
        input:focus { border-bottom: 1px solid #3b82f6; background: #27272a; }
        
        /* Sync Animation */
        .sync-pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-6">
            <div class="flex items-center gap-4">
                <div id="sync-indicator" class="w-3 h-3 bg-emerald-500 rounded-full sync-pulse"></div>
                <div>
                    <h1 class="text-xl font-bold tracking-tighter text-white">LIVE_NSE_FEED</h1>
                    <p class="text-zinc-500 text-[10px] uppercase tracking-widest">Auto-refreshing every 30s • <span id="last-update" class="mono text-zinc-300">Initializing...</span></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="syncMarketData()" class="text-[10px] bg-zinc-800 px-3 py-1 rounded hover:bg-zinc-700">MANUAL_REFRESH</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="glass-card p-5">
                <span class="text-[10px] text-zinc-500 uppercase block mb-1">Capital Deployed</span>
                <div class="flex items-center gap-1 text-2xl font-bold mono">
                    <span class="text-zinc-600">₹</span>
                    <input id="cap-input" type="number" step="0.01" class="w-full" onchange="calculate()">
                </div>
            </div>
            <div class="glass-card p-5">
                <span class="text-[10px] text-zinc-500 uppercase block mb-1">Leakage (Fines)</span>
                <div id="display-leaks" class="text-2xl font-bold mono text-rose-500">₹0.00</div>
            </div>
            <div class="glass-card p-5 border-l-4 border-emerald-500">
                <span class="text-[10px] text-zinc-500 uppercase block mb-1">Net Portfolio Value</span>
                <div id="display-net" class="text-2xl font-bold mono text-emerald-400">₹0.00</div>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="p-4 border-b border-zinc-800 bg-zinc-900/30 flex justify-between items-center">
                <span class="text-xs font-bold uppercase tracking-widest text-zinc-400">Active Trade Inventory</span>
                <button onclick="addRow()" class="bg-blue-600 text-white text-[10px] font-bold px-4 py-1.5 rounded">+ ADD NEW ASSET</button>
            </div>
            <table class="w-full text-xs text-left">
                <thead class="text-zinc-600 uppercase text-[10px] border-b border-zinc-800">
                    <tr>
                        <th class="p-4">Symbol</th>
                        <th class="p-4">Qty</th>
                        <th class="p-4">Avg Buy</th>
                        <th class="p-4">LTP (Live)</th>
                        <th class="p-4 text-right">P&L</th>
                        <th class="p-4"></th>
                    </tr>
                </thead>
                <tbody id="ledger-rows"></tbody>
            </table>
        </div>
        
        <div class="mt-8 grid grid-cols-3 gap-4 opacity-50 hover:opacity-100 transition">
             <div class="text-[10px]">AS_FINE: <input id="fine-as" type="number" class="w-12 border-b border-zinc-800" onchange="calculate()"></div>
             <div class="text-[10px]">GATEWAY: <input id="fine-pg" type="number" class="w-12 border-b border-zinc-800" onchange="calculate()"></div>
             <div class="text-[10px]">DP_CHRG: <input id="fine-dp" type="number" class="w-12 border-b border-zinc-800" onchange="calculate()"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('live_ledger_db')) || {
            capital: 5011,
            fines: { as: 59, pg: 21.24, dp: 0 },
            trades: [{ name: 'INFY', qty: 3, buy: 1303.30, ltp: 1308.40 }]
        };

        // THE ENGINE: Fetches live data without refreshing the page
        async function fetchLivePrice(symbol) {
            try {
                const proxy = "https://corsproxy.io/?"; 
                const url = `https://query1.financeapi.com/v8/finance/chart/${symbol}.NS?interval=1m&range=1d`;
                const response = await fetch(proxy + encodeURIComponent(url));
                const data = await response.json();
                return data.chart.result[0].meta.regularMarketPrice;
            } catch (e) { return null; }
        }

        async function syncMarketData() {
            const indicator = document.getElementById('sync-indicator');
            indicator.classList.add('sync-pulse');
            indicator.style.backgroundColor = '#10b981'; // Green for active

            for (let trade of db.trades) {
                if (trade.name && trade.name !== 'SYMBOL') {
                    const price = await fetchLivePrice(trade.name);
                    if (price) trade.ltp = price;
                }
            }
            
            document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
            render();
            calculate();
            
            // Brief pause on the pulse to show sync finished
            setTimeout(() => indicator.classList.remove('sync-pulse'), 2000);
        }

        function render() {
            const body = document.getElementById('ledger-rows');
            body.innerHTML = '';
            db.trades.forEach((t, i) => {
                const pnl = (t.ltp - t.buy) * t.qty;
                body.innerHTML += `
                    <tr class="border-b border-zinc-800/50">
                        <td class="p-4 font-bold"><input type="text" value="${t.name}" onchange="updateTrade(${i}, 'name', this.value)"></td>
                        <td class="p-4 mono"><input type="number" value="${t.qty}" onchange="updateTrade(${i}, 'qty', this.value)"></td>
                        <td class="p-4 mono text-zinc-500">₹<input type="number" value="${t.buy}" onchange="updateTrade(${i}, 'buy', this.value)"></td>
                        <td class="p-4 mono font-bold text-blue-400">₹${t.ltp.toFixed(2)}</td>
                        <td class="p-4 text-right mono font-bold ${pnl >= 0 ? 'text-emerald-500' : 'text-rose-500'}">₹${pnl.toFixed(2)}</td>
                        <td class="p-4 text-right"><button onclick="deleteTrade(${i})" class="text-zinc-800 hover:text-rose-500">×</button></td>
                    </tr>
                `;
            });
            save();
        }

        function calculate() {
            db.capital = parseFloat(document.getElementById('cap-input').value) || 0;
            db.fines.as = parseFloat(document.getElementById('fine-as').value) || 0;
            db.fines.pg = parseFloat(document.getElementById('fine-pg').value) || 0;
            db.fines.dp = parseFloat(document.getElementById('fine-dp').value) || 0;

            const totalLeaks = db.fines.as + db.fines.pg + db.fines.dp;
            let mktVal = db.trades.reduce((acc, t) => acc + (t.qty * t.ltp), 0);
            let invested = db.trades.reduce((acc, t) => acc + (t.qty * t.buy), 0);
            
            const netWorth = db.capital + (mktVal - invested) - totalLeaks;

            document.getElementById('display-leaks').innerText = `₹${totalLeaks.toFixed(2)}`;
            document.getElementById('display-net').innerText = `₹${netWorth.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
            save();
        }

        function updateTrade(i, key, val) {
            db.trades[i][key] = key === 'name' ? val.toUpperCase() : parseFloat(val);
            render(); calculate();
        }

        function addRow() { db.trades.push({ name: 'SYMBOL', qty: 0, buy: 0, ltp: 0 }); render(); }
        function deleteTrade(i) { db.trades.splice(i, 1); render(); calculate(); }
        function save() { localStorage.setItem('live_ledger_db', JSON.stringify(db)); }

        window.onload = () => {
            document.getElementById('cap-input').value = db.capital;
            document.getElementById('fine-as').value = db.fines.as;
            document.getElementById('fine-pg').value = db.fines.pg;
            document.getElementById('fine-dp').value = db.fines.dp;
            render();
            calculate();
            
            // This is the "Constant Refreshing" part:
            syncMarketData(); // Initial sync
            setInterval(syncMarketData, 30000); // Sync every 30 seconds thereafter
        };
    </script>
</body>
</html>
